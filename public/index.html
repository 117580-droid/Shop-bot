<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messi's Point Hub</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1>Messi's Point Hub</h1>
    </header>

    <!-- Tab Navigation -->
    <nav class="tabs">
      <button class="tab-btn active" data-tab="signin">Sign In</button>
      <button class="tab-btn" data-tab="profile">Profile</button>
      <button class="tab-btn" data-tab="leaderboard">Leaderboard</button>
      <button class="tab-btn" data-tab="shop">Shop</button>
    </nav>

    <!-- Tab Content -->
    <main class="tab-content">
      <!-- Sign In Tab -->
      <section id="signin" class="tab-pane active">
        <div class="signin-container">
          <button id="discord-login" class="discord-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515a.074.074 0 0 0-.079.037c-.211.375-.444.864-.607 1.25a18.27 18.27 0 0 0-5.487 0c-.163-.386-.395-.875-.607-1.25a.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057a19.9 19.9 0 0 0 5.993 3.03a.078.078 0 0 0 .084-.028a14.975 14.975 0 0 0 1.293-2.1a.07.07 0 0 0-.038-.098a13.11 13.11 0 0 1-1.872-.892a.072.072 0 0 1-.007-.12a10.15 10.15 0 0 0 .372-.294a.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.294a.072.072 0 0 1-.006.12a12.977 12.977 0 0 1-1.873.892a.07.07 0 0 0-.038.098a14.047 14.047 0 0 0 1.294 2.1a.077.077 0 0 0 .084.028a19.963 19.963 0 0 0 6.002-3.03a.076.076 0 0 0 .032-.057c.5-4.506-.838-8.962-3.552-12.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-.965-2.157-2.156c0-1.193.964-2.157 2.157-2.157c1.193 0 2.156.964 2.157 2.157c0 1.19-.964 2.156-2.157 2.156zm7.975 0c-1.183 0-2.157-.965-2.157-2.156c0-1.193.964-2.157 2.157-2.157c1.193 0 2.156.964 2.157 2.157c0 1.19-.964 2.156-2.157 2.156z"/>
            </svg>
            Sign in with Discord
          </button>
        </div>
      </section>

      <!-- Profile Tab -->
      <section id="profile" class="tab-pane">
        <div class="profile-container">
          <div id="profile-content" class="profile-content">
            <!-- Will be populated by JavaScript -->
          </div>
        </div>
      </section>

      <!-- Leaderboard Tab -->
      <section id="leaderboard" class="tab-pane">
        <div class="leaderboard-container">
          <div id="leaderboard-list" class="leaderboard-list">
            <!-- Will be populated by JavaScript -->
          </div>
        </div>
      </section>

      <!-- Shop Tab -->
      <section id="shop" class="tab-pane">
        <div class="shop-container">
          <div id="shop-items" class="shop-items">
            <!-- Will be populated by JavaScript -->
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
