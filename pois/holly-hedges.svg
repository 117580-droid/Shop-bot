<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="256" height="256" fill="#1a1a2e"/>
  
  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#228B22;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- Main shape -->
  <circle cx="128" cy="128" r="100" fill="url(#grad)"/>
  
  <!-- Border -->
  <circle cx="128" cy="128" r="100" fill="none" stroke="#228B22" stroke-width="3"/>
  
  <!-- POI Name -->
  <text x="128" y="110" font-family="Arial, sans-serif" font-size="18" font-weight="bold" 
        text-anchor="middle" fill="white">Holly Hedges</text>
  
  <!-- Description -->
  <text x="128" y="145" font-family="Arial, sans-serif" font-size="12" 
        text-anchor="middle" fill="#228B22">Hedges</text>
  
  <!-- Fortnite marker -->
  <polygon points="128,60 145,90 110,90" fill="#228B22"/>
</svg>